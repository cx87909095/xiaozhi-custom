name: Build Xiaozhi Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup ESP-IDF
        uses: espressif/setup-espressif-idf@v1
        with:
          idf-version: v5.3
          target: esp32s3 # 改成你的芯片型号（esp32/esp32s3/esp32c3）
      - name: Build firmware
        run: |
          idf.py set-target esp32s3
          idf.py build
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: build/*.bin
